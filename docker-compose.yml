services:
  postgres:
    image: postgres:16-alpine
    container_name: umra-postgres
    environment:
      POSTGRES_DB: umra
      POSTGRES_USER: umra
      POSTGRES_PASSWORD: umra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: umra-server
    depends_on:
      - postgres
    environment:
      UMRA_ANALYZERS_PCPTRC_ONLINE_FORWARDING_ENABLED: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/umra
      SPRING_DATASOURCE_USERNAME: umra
      SPRING_DATASOURCE_PASSWORD: umra
    ports:
      - "8080:8080"

  client:
    build:
      context: ./client
    container_name: umra-client
    depends_on:
      - server
    ports:
      - "4173:4173"

volumes:
  pgdata: